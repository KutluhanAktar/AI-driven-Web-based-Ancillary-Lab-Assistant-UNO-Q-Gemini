<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Analysis - LED Interface</title>
    <style>
        :root {
            --micro-color: #ecf0f1;
            --accent-blue: #3498db;
            --led-green: #2ecc71;
            --led-amber: #f1c40f;
            --bg-color: #0f172a; /* Deep lab navy */
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            color: var(--micro-color);
        }

        .microscope-wrapper {
            position: relative;
            width: 100px;
            height: 140px;
            margin-bottom: 20px;
        }

        /* Microscope Body */
        .base {
            position: absolute;
            bottom: 0;
            width: 90px;
            height: 12px;
            background: var(--micro-color);
            border-radius: 4px;
            left: 50%;
            transform: translateX(-50%);
        }

        .arm {
            position: absolute;
            bottom: 12px;
            right: 10px;
            width: 50px;
            height: 80px;
            border: 10px solid var(--micro-color);
            border-left: none;
            border-bottom: none;
            border-radius: 0 45px 0 0;
        }

        .lens-assembly {
            position: absolute;
            top: 15px;
            left: 10px;
            width: 24px;
            height: 40px;
            background: var(--micro-color);
            border-radius: 3px;
            animation: focus 2.5s infinite ease-in-out;
        }

        .eyepiece {
            position: absolute;
            top: -10px;
            left: 5px;
            width: 14px;
            height: 20px;
            background: var(--micro-color);
            transform: rotate(-25deg);
            border-radius: 2px;
        }

        .stage {
            position: absolute;
            bottom: 45px;
            left: 5px;
            width: 60px;
            height: 6px;
            background: #334155;
        }

        /* Scanning Slide */
        .slide {
            position: absolute;
            bottom: 51px;
            left: 10px;
            width: 35px;
            height: 4px;
            background: var(--accent-blue);
            box-shadow: 0 0 15px var(--accent-blue);
            animation: scan 2s infinite ease-in-out;
        }

        /* LED Panel Styling */
        .led-panel {
            display: flex;
            gap: 12px;
            margin-top: 25px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .led {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #333;
        }

        .led-green { animation: blink-green 1s infinite; }
        .led-blue { animation: blink-blue 1.4s infinite; }
        .led-amber { animation: blink-amber 0.8s infinite; }

        /* Animations */
        @keyframes focus {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(10px); }
        }

        @keyframes scan {
            0%, 100% { transform: translateX(0); opacity: 0.6; }
            50% { transform: translateX(20px); opacity: 1; }
        }

        @keyframes blink-green {
            0%, 100% { background: #14532d; box-shadow: none; }
            50% { background: var(--led-green); box-shadow: 0 0 10px var(--led-green); }
        }

        @keyframes blink-blue {
            0%, 100% { background: #1e3a8a; box-shadow: none; }
            50% { background: var(--accent-blue); box-shadow: 0 0 10px var(--accent-blue); }
        }

        @keyframes blink-amber {
            0%, 100% { background: #78350f; box-shadow: none; }
            50% { background: var(--led-amber); box-shadow: 0 0 10px var(--led-amber); }
        }

        h2 {
            font-weight: 300;
            font-size: 0.85rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-top: 15px;
            color: #94a3b8;
        }
    </style>
</head>
<body>

    <div class="microscope-wrapper">
        <div class="base"></div>
        <div class="arm"></div>
        <div class="stage"></div>
        <div class="slide"></div>
        <div class="lens-assembly">
            <div class="eyepiece"></div>
        </div>
    </div>

    <div class="led-panel">
        <div class="led led-green"></div>
        <div class="led led-blue"></div>
        <div class="led led-amber"></div>
    </div>

    <h2>Collecting Sensor Data</h2>

</body>
</html>
