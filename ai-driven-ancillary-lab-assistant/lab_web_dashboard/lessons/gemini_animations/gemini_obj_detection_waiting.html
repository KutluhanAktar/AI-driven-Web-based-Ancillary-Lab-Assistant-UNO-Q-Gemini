<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Camera Icon</title>
    <style>
        body {
            background-color: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .camera-wrapper {
            position: relative;
            width: 150px;
            height: 150px;
        }

        /* The Camera Body */
        .camera-icon {
            fill: #e0e0e0;
            filter: drop-shadow(0 0 10px rgba(0, 255, 204, 0.3));
        }

        /* Lens Shutter Animation */
        .lens-inner {
            fill: #1a1a1a;
            transform-origin: center;
            animation: breathe 3s ease-in-out infinite;
        }

        /* Pulsing Recording Dot */
        .rec-dot {
            fill: #ff3e3e;
            animation: blink 1s step-end infinite;
        }

        /* Scanning Ring */
        .scan-ring {
            fill: none;
            stroke: #00ffcc;
            stroke-width: 2;
            stroke-dasharray: 10, 30;
            transform-origin: center;
            animation: rotate 4s linear infinite;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="camera-wrapper">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <circle class="scan-ring" cx="50" cy="55" r="40" />
        
        <path class="camera-icon" d="M85,35 H75 V30 Q75,25 70,25 H30 Q25,25 25,30 V35 H15 Q10,35 10,40 V75 Q10,80 15,80 H85 Q90,80 90,75 V40 Q90,35 85,35 Z" />
        
        <circle fill="#333" cx="50" cy="55" r="18" />
        
        <circle class="lens-inner" cx="50" cy="55" r="12" />
        
        <circle class="rec-dot" cx="80" cy="45" r="3" />
    </svg>
</div>

</body>
</html>
