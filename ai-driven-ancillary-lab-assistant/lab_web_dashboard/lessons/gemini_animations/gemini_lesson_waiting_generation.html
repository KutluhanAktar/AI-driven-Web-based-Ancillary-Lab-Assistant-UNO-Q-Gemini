<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mega-Bot Genetics Lab: Final Edition</title>
    <style>
:root {
    --bg: #0f172a;
    --accent: #00f2ff;
    --robot-body: #475569;
    --microbe-color: #4ade80;
    --dna-a: #ff4757;
    --dna-c: #54a0ff;
    --bar-bg: rgba(255, 255, 255, 0.1);
}

body {
    background: var(--bg);
    margin: 0;
    padding: 0;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

.lab-bench {
    position: relative;
    width: 1150px;
    height: 650px;
    background: #1e293b;
    border-radius: 30px;
    border-bottom: 25px solid #000;
    box-shadow: 0 50px 100px rgba(0,0,0,0.5);
    
    /* THE FIX: Force the bench to scale down to fit small widths */
    transform-origin: center center;
    flex-shrink: 0;
}

/* This handles the math to make 1150px fit into a 400px (or smaller) container */
@media (max-width: 1150px) {
    .lab-bench {
        transform: scale(calc(100vw / 1155));
    }
}

/* --- DUAL DISPLAY SCREENS --- */
.display-unit {
    position: absolute;
    background: #000;
    border: 8px solid #334155;
    box-shadow: 0 0 30px rgba(0,0,0,1);
    overflow: hidden;
    z-index: 5;
    opacity: 0;
    animation: screensPower 8s infinite ease-in-out;
}

.view-microbes { top: 40px; left: 40px; width: 220px; height: 220px; border-radius: 50%; }
.view-dna { top: 40px; left: 300px; width: 300px; height: 220px; border-radius: 15px; display: flex; justify-content: center; align-items: center; perspective: 600px;}

/* --- THE MICROSCOPE --- */
.microscope-wrap {
    position: absolute;
    bottom: 60px;
    left: 65%;
    width: 180px;
    height: 280px;
}
.m-base { position: absolute; bottom: 0; width: 160px; height: 30px; background: #000; border-radius: 5px 5px 20px 20px; }
.m-light { position: absolute; bottom: 30px; left: 65px; width: 30px; height: 10px; background: #fff; box-shadow: 0 0 20px var(--accent); }
.m-arm { position: absolute; bottom: 30px; right: 10px; width: 120px; height: 210px; border-right: 22px solid #111; border-top: 22px solid #111; border-radius: 0 70px 0 0; }
.m-stage { position: absolute; bottom: 100px; left: 0; width: 110px; height: 15px; background: #111; border-radius: 3px; z-index: 5; }
.m-turret { position: absolute; top: 55px; left: 15px; width: 70px; height: 40px; background: #111; border-radius: 40px 40px 0 0; transform: rotate(15deg); }
.m-obj { position: absolute; width: 12px; height: 45px; background: #334155; border-bottom: 4px solid var(--accent); top: 30px; }
.obj-1 { left: 10px; transform: rotate(25deg); border-bottom-color: #ff4757; }
.obj-2 { left: 30px; transform: rotate(0deg); height: 55px; border-bottom-color: #eccc68; }
.obj-3 { left: 50px; transform: rotate(-25deg); border-bottom-color: cyan; }
.m-tube { position: absolute; top: 0; right: 0; width: 45px; height: 80px; background: #111; transform: rotate(-30deg); border-radius: 5px; }
.m-eyepiece { position: absolute; top: -20px; left: 8px; width: 30px; height: 25px; background: #000; border-radius: 4px; }

/* --- THE ROBOT --- */
.robot {
    position: absolute;
    bottom: 60px;
    left: 50px;
    width: 200px;
    height: 250px;
    animation: moveRobot 8s infinite ease-in-out;
    z-index: 10;
}
.r-body { width: 180px; height: 200px; background: var(--robot-body); border: 6px solid #1e293b; border-radius: 40px 40px 20px 20px; position: relative; }
.r-head {
    position: absolute;
    top: -90px;
    left: 30px;
    width: 120px;
    height: 100px;
    background: var(--robot-body);
    border: 4px solid #1e293b;
    border-radius: 20px;
    transform-origin: bottom center;
    animation: headBow 8s infinite ease-in-out;
}
.r-eye {
    position: absolute; top: 35px; left: 20px; width: 25px; height: 25px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 20px var(--accent);
    animation: blink 4s infinite;
}
.r-eye.right { left: 75px; }

/* --- DYNAMIC LOADING BAR --- */
.loading-container {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    width: 400px;
    text-align: center;
}

.loading-label {
    color: var(--accent);
    font-size: 12px;
    margin-bottom: 8px;
    letter-spacing: 2px;
    opacity: 0;
    animation: labelFade 8s infinite ease-in-out;
}

.bar-track {
    width: 100%;
    height: 12px;
    background: var(--bar-bg);
    border-radius: 10px;
    border: 1px solid rgba(0, 242, 255, 0.3);
    overflow: hidden;
}

.bar-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #008080, var(--accent));
    box-shadow: 0 0 10px var(--accent);
    animation: fillBar 8s infinite ease-in-out;
}

/* --- DNA & MICROBE ANIMATIONS --- */
.microbe-box { width: 100%; height: 100%; position: relative; background: radial-gradient(circle, #064e3b 0%, #000 100%); }
.microbe { position: absolute; background: var(--microbe-color); border-radius: 50%; filter: blur(1px); animation: swim 4s infinite linear; }

.helix-container { position: relative; width: 100px; height: 160px; transform-style: preserve-3d; }
.rung { position: absolute; width: 80px; height: 4px; background: rgba(255,255,255,0.1); left: 10px; transform-style: preserve-3d; animation: rotateHelix 3s infinite linear; }
.rung::before, .rung::after { content: ''; position: absolute; width: 10px; height: 10px; border-radius: 50%; top: -3px; }
.rung::before { left: -5px; background: var(--dna-a); }
.rung::after { right: -5px; background: var(--dna-c); }

.rung:nth-child(1) { top: 10px; animation-delay: -0.2s; }
.rung:nth-child(2) { top: 30px; animation-delay: -0.4s; }
.rung:nth-child(3) { top: 50px; animation-delay: -0.6s; }
.rung:nth-child(4) { top: 70px; animation-delay: -0.8s; }
.rung:nth-child(5) { top: 90px; animation-delay: -1.0s; }
.rung:nth-child(6) { top: 110px; animation-delay: -1.2s; }
.rung:nth-child(7) { top: 130px; animation-delay: -1.4s; }
.rung:nth-child(8) { top: 150px; animation-delay: -1.6s; }

/* --- KEYFRAMES --- */
@keyframes fillBar {
    0%, 45% { width: 0%; }
    50% { width: 0%; }
    75% { width: 100%; }
    80%, 100% { width: 100%; opacity: 0; }
}
@keyframes labelFade {
    0%, 45% { opacity: 0; }
    50%, 75% { opacity: 1; }
    80%, 100% { opacity: 0; }
}
@keyframes moveRobot { 0%, 10% { transform: translateX(0); } 40%, 75% { transform: translateX(480px); } 100% { transform: translateX(0); } }
@keyframes headBow { 0%, 35%, 80%, 100% { transform: rotate(0deg); } 45%, 70% { transform: rotate(35deg) translate(20px, 15px); } }
@keyframes screensPower { 0%, 45% { opacity: 0; } 50%, 75% { opacity: 1; } 80%, 100% { opacity: 0; } }
@keyframes swim { 0% { transform: translate(0,0); } 33% { transform: translate(30px, -20px); } 66% { transform: translate(-20px, 40px); } 100% { transform: translate(0,0); } }
@keyframes rotateHelix { from { transform: rotateY(0deg); } to { transform: rotateY(360deg); } }
@keyframes blink { 0%, 90%, 100% { transform: scaleY(1); } 95% { transform: scaleY(0.1); } }
    </style>
</head>
<body>

<div class="lab-bench">
    <div class="display-unit view-microbes">
        <div class="microbe-box">
            <div class="microbe" style="width:20px; height:30px; top:30%; left:30%;"></div>
            <div class="microbe" style="width:15px; height:15px; top:60%; left:50%; animation-delay:1s;"></div>
            <div class="microbe" style="width:25px; height:20px; top:40%; left:70%; animation-delay:2s;"></div>
        </div>
    </div>

    <div class="display-unit view-dna">
        <div class="helix-container">
            <div class="rung"></div><div class="rung"></div><div class="rung"></div>
            <div class="rung"></div><div class="rung"></div><div class="rung"></div>
            <div class="rung"></div><div class="rung"></div>
        </div>
    </div>

    <div class="microscope-wrap">
        <div class="m-base"></div><div class="m-light"></div><div class="m-arm"></div><div class="m-stage"></div>
        <div class="m-turret">
            <div class="m-obj obj-1"></div><div class="m-obj obj-2"></div><div class="m-obj obj-3"></div>
        </div>
        <div class="m-tube"><div class="m-eyepiece"></div></div>
    </div>

    <div class="robot">
        <div class="r-head"><div class="r-eye"></div><div class="r-eye right"></div></div>
        <div class="r-body"></div>
    </div>

    <div class="loading-container">
        <div class="loading-label">Gemini Lesson Generation in Progress...</div>
        <div class="bar-track">
            <div class="bar-fill"></div>
        </div>
    </div>
</div>

</body>
</html>
