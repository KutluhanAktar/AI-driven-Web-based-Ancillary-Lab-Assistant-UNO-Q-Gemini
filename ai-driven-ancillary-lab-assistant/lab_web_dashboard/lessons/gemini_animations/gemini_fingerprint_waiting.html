<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simplified Fingerprint Animation (Waiting State)</title>
    <style>
        :root {
            --bg-color: #0A0C0E;
            --sensor-border: rgba(255, 255, 255, 0.15);
            --cyan-glow: #00FFC8;
            --accent-waiting: #FFCC00; /* Amber color for waiting */
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: sans-serif;
        }

        /* --- THE SENSOR WINDOW --- */
        .sensor-container {
            width: 250px;
            height: 250px;
            background-color: #121418;
            border-radius: 16px;
            border: 2px solid var(--sensor-border);
            box-shadow: 0 0 40px rgba(0,0,0,0.6);
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Corner accents */
        .corner {
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }
        .tl { top: 10px; left: 10px; border-right: none; border-bottom: none; }
        .tr { top: 10px; right: 10px; border-left: none; border-bottom: none; }
        .bl { bottom: 10px; left: 10px; border-right: none; border-top: none; }
        .br { bottom: 10px; right: 10px; border-left: none; border-top: none; }

        /* --- THE FINGER ANIMATION --- */
        .finger {
            position: absolute;
            width: 140px;
            height: 380px;
            background: #E8B499; /* Skin tone */
            border-radius: 70px 70px 20px 20px;
            box-shadow: inset 0 0 25px rgba(0,0,0,0.3);
            
            /* The movement timeline (enters, hovers, presses, holds, lifts, exits) */
            animation: fingerFlow 8s ease-in-out infinite;
            z-index: 10;
        }

        /* Simplified fingerprint ridge texture */
        .finger-print {
            position: absolute;
            top: 25px;
            left: 20px;
            width: 100px;
            height: 160px;
            background: repeating-radial-gradient(
                circle at 50% 50%,
                #E8B499,
                #E8B499 3px,
                #C08F75 4px,
                #E8B499 5px
            );
            border-radius: 50px;
            opacity: 0.6;
        }

        /* --- SCANNING VISUALS --- */
        .scan-rings-group {
            width: 160px;
            height: 160px;
            position: relative;
            opacity: 0; /* Hidden by default, synced to finger press */
            z-index: 5;
        }

        .ring {
            position: absolute;
            border-radius: 50%;
            border: 2px solid var(--cyan-glow);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 15px var(--cyan-glow);
        }

        .ring-1 { width: 15px; height: 15px; border-width: 5px; }
        .ring-2 { width: 50px; height: 50px; }
        .ring-3 { width: 90px; height: 90px; }
        /* Rotating Outer Dashed Ring */
        .ring-4 {
            width: 130px; height: 130px; border-style: dashed;
            animation: outerRingRotate 5s linear infinite;
        }

        /* --- WAITING INDICATOR (Ellipsis) --- */
        .waiting-mark {
            position: absolute;
            bottom: 15px;
            left: 15px;
            display: flex;
            gap: 4px;
            opacity: 0; /* Hidden until scan ends */
            z-index: 15;
            animation: waitingSignal 8s ease-in-out infinite;
        }

        .dot {
            width: 8px;
            height: 8px;
            background-color: var(--accent-waiting);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent-waiting);
            animation: dotPulse 1.5s ease-in-out infinite;
        }

        /* Stagger the dot animations */
        .dot-1 { animation-delay: 0s; }
        .dot-2 { animation-delay: 0.3s; }
        .dot-3 { animation-delay: 0.6s; }

        /* --- THE ANIMATION CYCLE DEFINITIONS --- */

        /* 1. Finger moves in/out of frame */
        @keyframes fingerFlow {
            0%   { left: 300px; top: -50px; transform: rotate(15deg); }   /* Exit hidden */
            10%  { left: 55px;  top: -50px; transform: rotate(15deg); }   /* Enter */
            20%  { left: 55px;  top: -50px; transform: rotate(0deg);  }   /* Align */
            25%  { left: 55px;  top: 50px;  transform: rotate(0deg);  }   /* Press Down (Contact) */
            60%  { left: 55px;  top: 50px;  transform: rotate(0deg);  }   /* Hold Press */
            70%  { left: 55px;  top: -50px; transform: rotate(0deg);  }   /* Lift Up */
            80%  { left: 300px; top: -50px; transform: rotate(15deg); }   /* Exit */
            100% { left: 300px; top: -50px; transform: rotate(15deg); }   /* Loop pause */
        }

        /* 2. Scanning rings activate during finger press */
        .trigger-area .scan-rings-group {
            animation: scanActivate 8s ease-in-out infinite;
        }

        @keyframes scanActivate {
            0%, 24% { opacity: 0; transform: scale(0.6); }   /* Hidden */
            25%      { opacity: 1; transform: scale(1); }       /* Contact: Appear */
            59%      { opacity: 1; transform: scale(1.05); }    /* Hold: Slight Pulse */
            60%      { opacity: 0; transform: scale(0.9); }     /* Lift: Disappear */
            100%     { opacity: 0; }
        }

        /* 3. Waiting indicator appears AFTER the scan ends */
        .trigger-area .waiting-mark {
            animation: waitingSignal 8s ease-in-out infinite;
        }

        @keyframes waitingSignal {
            0%, 61% { opacity: 0; transform: translateY(10px); }   /* Hidden during scan */
            65%      { opacity: 1; transform: translateY(0); }       /* Appear after lift */
            79%      { opacity: 1; }
            80%, 100% { opacity: 0; transform: translateY(-10px); } /* Fade for exit */
        }

        /* 4. Ellipsis Dot Pulsing (Standard Loading) */
        @keyframes dotPulse {
            0%, 100% { transform: scale(1); opacity: 0.7; }
            50%      { transform: scale(1.3); opacity: 1; }
        }

        /* 5. Rotating Outer Ring */
        @keyframes outerRingRotate {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to   { transform: translate(-50%, -50%) rotate(360deg); }
        }

    </style>
</head>
<body>

    <div class="sensor-container trigger-area">
        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>
        
        <div class="scan-rings-group">
            <div class="ring ring-1"></div>
            <div class="ring ring-2"></div>
            <div class="ring ring-3"></div>
            <div class="ring ring-4"></div>
        </div>

        <div class="waiting-mark">
            <div class="dot dot-1"></div>
            <div class="dot dot-2"></div>
            <div class="dot dot-3"></div>
        </div>

        <div class="finger">
            <div class="finger-print"></div>
        </div>
    </div>

</body>
</html>
