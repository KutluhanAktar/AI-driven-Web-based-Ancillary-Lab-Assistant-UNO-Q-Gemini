<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background-color: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            flex-direction: column;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Robot Container */
        .robot {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: hover 3s ease-in-out infinite;
        }

        /* Head */
        .head {
            width: 100px;
            height: 80px;
            background: #e0e0e0;
            border-radius: 20px;
            position: relative;
            border: 4px solid #333;
            z-index: 2;
        }

        .eyes {
            display: flex;
            justify-content: space-around;
            padding-top: 25px;
        }

        .eye {
            width: 15px;
            height: 15px;
            background: #333;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
        }

        /* Scanning Beam */
        .beam {
            width: 40px;
            height: 2px;
            background: #00fbff;
            position: absolute;
            bottom: 20px;
            left: 30px;
            border-radius: 10px;
            box-shadow: 0 0 12px #00fbff;
            animation: scan 2s ease-in-out infinite;
        }

        /* Antenna */
        .antenna {
            width: 4px;
            height: 20px;
            background: #333;
            position: absolute;
            top: -20px;
            left: 48px;
        }

        .antenna::before {
            content: '';
            position: absolute;
            width: 10px;
            height: 10px;
            background: #ff4d4d;
            border-radius: 50%;
            top: -8px;
            left: -3px;
            animation: pulse 1s infinite;
        }

        /* Body */
        .body {
            width: 120px;
            height: 90px;
            background: #c0c0c0;
            border-radius: 20px 20px 50px 50px;
            border: 4px solid #333;
            margin-top: -10px;
            z-index: 1;
        }

        /* Status Text */
        .status-text {
            margin-top: 40px;
            font-size: 1.2rem;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            animation: colorChange 4s linear infinite;
        }

        /* Animations */
        @keyframes hover {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        @keyframes scan {
            0%, 100% { transform: translateX(-15px); opacity: 0.2; }
            50% { transform: translateX(15px); opacity: 1; }
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 77, 77, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(255, 77, 77, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 77, 77, 0); }
        }

        @keyframes colorChange {
            0% { color: #00fbff; text-shadow: 0 0 10px #00fbff; }
            33% { color: #bd00ff; text-shadow: 0 0 10px #bd00ff; }
            66% { color: #ffffff; text-shadow: 0 0 10px #ffffff; }
            100% { color: #00fbff; text-shadow: 0 0 10px #00fbff; }
        }
    </style>
</head>
<body>

    <div class="robot">
        <div class="antenna"></div>
        <div class="head">
            <div class="eyes">
                <div class="eye"></div>
                <div class="eye"></div>
            </div>
            <div class="beam"></div>
        </div>
        <div class="body"></div>
    </div>

    <div class="status-text">Please select a previous lesson <br>or generate a new one!</div>

</body>
</html>
